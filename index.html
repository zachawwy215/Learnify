<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learnify - AI Study Assistant</title>
    
    <!-- Stable Library Loading -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://js.puter.com/v2/"></script>

    <style>
        /* Merged Professional Aesthetic */
        body {
            margin: 0; padding: 20px 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f4f7f6;
            background-image: linear-gradient(135deg, #e0eafc 0%, #cfdef3 100%);
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }

        .main-wrapper {
            display: flex; flex-direction: row; gap: 20px;
            max-width: 1200px; width: 95%; align-items: flex-start;
            justify-content: center; margin-bottom: 60px;
        }

        .container {
            background: rgba(255, 255, 255, 0.98);
            padding: 30px; border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            flex: 2; text-align: center; position: relative;
        }

        .instruction-box {
            background: white; padding: 20px; border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            flex: 1; min-width: 280px; text-align: left; border-left: 5px solid #3498db;
        }

        .lang-node { position: absolute; top: 15px; right: 20px; }
        img.logo { width: 100px; height: 100px; border-radius: 50%; margin-bottom: 10px; border: 3px solid #3498db; }
        h1 { color: #2c3e50; margin: 5px 0; font-size: 2.2rem; }
        
        .section { margin: 15px 0; padding: 10px; }
        .control-row { display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; margin-bottom: 20px; background: #f8f9fa; padding: 15px; border-radius: 12px; }
        
        .btn { padding: 12px 20px; margin: 5px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-primary { background: #3498db; color: white; }
        .btn-translate { background: #e74c3c; color: white; }
        
        #output-container { 
            text-align: left; background: #fff; padding: 25px; border-radius: 12px; 
            border: 1px solid #eee; max-height: 500px; overflow-y: auto; 
            line-height: 1.6; white-space: pre-wrap;
        }

        .footer-credit-bar { width: 100%; padding: 20px 0; text-align: center; margin-top: auto; font-weight: bold; color: #2c3e50; }
        
        #game-section { margin-top: 30px; padding: 20px; background: #fffcf0; border-radius: 15px; border: 1px solid #f1c40f; }
    </style>
</head>
<body>

<div class="main-wrapper">
    <div class="container">
        <div class="lang-node">
            <button class="btn" style="background:#9b59b6; color:white; font-size:0.75rem;" id="uiLangBtn" onclick="toggleUILanguage()">Bahasa Malaysia</button>
        </div>

        <img src="logo_learnify.png" alt="Logo" class="logo">
        <h1 id="main-title">Learnify</h1>

        <div class="section">
            <div onclick="document.getElementById('fileInput').click()" style="border: 2px dashed #3498db; padding: 20px; border-radius: 12px; cursor: pointer; background: #fff;">
                <span id="file-label" style="font-weight:bold; color:#3498db;">📁 Upload PDF or Image[cite: 4]</span>
                <input type="file" id="fileInput" accept=".pdf,image/*" style="display:none" onchange="handleFileSelect()">
            </div>
        </div>

        <div id="setup-section" style="display:none;">
            <div class="control-row">
                <select id="qType" style="padding:10px; border-radius:5px;">
                    <option value="Objective Only">Objective Only[cite: 4]</option>
                    <option value="Subjective Only">Subjective Only[cite: 4]</option>
                </select>
                <select id="qCount" style="padding:10px; border-radius:5px;">
                    <option value="5">5 Questions[cite: 4]</option>
                    <option value="10">10 Questions[cite: 4]</option>
                </select>
            </div>

            <button class="btn btn-primary" onclick="runAI('student')">🎒 Student Mode[cite: 4]</button>
            <button class="btn btn-primary" style="background:#2ecc71" onclick="runAI('teacher')">🧑‍🏫 Teacher Mode[cite: 4]</button>
            <button class="btn btn-translate" onclick="translateToBM()">🌐 Translate to BM[cite: 4]</button>
        </div>

        <div id="output-container">Waiting for upload...[cite: 4]</div>
    </div>

    <div class="instruction-box">
        <h2 id="inst-title">Quick Guide[cite: 4]</h2>
        <ul id="inst-list">
            <li>1. Upload PDF/Image[cite: 4]</li>
            <li>2. Choose Question Mode[cite: 4]</li>
            <li>3. Translate notes to BM[cite: 4]</li>
        </ul>
    </div>
</div>

<div class="footer-credit-bar">
    Neo Dominion (Computer System Operation, Sarawak Skills 2026)[cite: 4]
</div>

<script>
    // FIX: Reverting to stable initialization[cite: 2]
    var pdfjsLib = window['pdfjs-dist/build/pdf'];
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

    let lastExtractedText = "";
    let currentUILang = 'en';

    async function handleFileSelect() {
        const file = document.getElementById('fileInput').files[0];
        if (!file) return;
        
        document.getElementById('file-label').innerText = "📄 " + file.name;
        document.getElementById('output-container').innerHTML = "Extracting content...[cite: 2]";

        try {
            if (file.type === "application/pdf") {
                const pdf = await pdfjsLib.getDocument({data: await file.arrayBuffer()}).promise;
                let text = "";
                for (let i = 1; i <= pdf.numPages; i++) {
                    const page = await pdf.getPage(i);
                    text += (await page.getTextContent()).items.map(item => item.str).join(' ') + " ";
                }
                lastExtractedText = text;
            } else {
                lastExtractedText = await puter.ai.img2txt(file);[cite: 2]
            }
            document.getElementById('setup-section').style.display = "block";
            document.getElementById('output-container').innerHTML = "Ready! Choose a mode below.[cite: 4]";
        } catch (e) {
            document.getElementById('output-container').innerHTML = "❌ Error reading file.[cite: 2]";
        }
    }

    async function runAI(mode) {
        const out = document.getElementById('output-container');
        out.innerHTML = "✨ Generating...[cite: 2]";
        
        const prompt = `Use this text: "${lastExtractedText.substring(0, 6000)}" to create ${document.getElementById('qCount').value} ${document.getElementById('qType').value} questions. End with ---ANSWERS-START--- and the key.[cite: 2]`;

        try {
            const res = await puter.ai.chat(prompt);
            const parts = res.message.content.split("---ANSWERS-START---");
            
            if (mode === 'student') {
                out.innerHTML = `<h3>Quiz</h3>${parts[0]}<details><summary>Show Answers</summary>${parts[1]}</details>`;
            } else {
                out.innerHTML = `<h3>Teacher Key</h3>${parts[0]}<hr>${parts[1]}`;
            }
        } catch (e) { out.innerHTML = "❌ AI Error.[cite: 2]"; }
    }

    async function translateToBM() {
        const out = document.getElementById('output-container');
        out.innerHTML = "🌐 Translating...[cite: 2]";
        
        // Use chunking for stability[cite: 4]
        const textToProcess = lastExtractedText.substring(0, 4000);
        const prompt = `Translate this to formal Bahasa Malaysia, keeping technical terms in brackets: "${textToProcess}"[cite: 4]`;

        try {
            const res = await puter.ai.chat(prompt);
            out.innerHTML = `<h3>Terjemahan</h3>${res.message.content}`;
        } catch (e) { out.innerHTML = "❌ Translation Error.[cite: 2]"; }
    }

    function toggleUILanguage() {
        currentUILang = currentUILang === 'en' ? 'ms' : 'en';
        document.getElementById('uiLangBtn').innerText = currentUILang === 'en' ? "Bahasa Malaysia" : "English";
        // Additional UI toggles can be added here[cite: 4]
    }
</script>
</body>
</html>
