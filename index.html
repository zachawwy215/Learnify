<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learnify Ultimate - AI Study Assistant</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://js.puter.com/v2/"></script>

    <style>
        body {
            margin: 0; padding: 0;
            font-family: 'Segoe UI', sans-serif;
            background: url('background_learnify.jpg') no-repeat center center fixed;
            background-size: cover;
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
        }

        .container {
            background: rgba(255, 255, 255, 0.97);
            padding: 30px; border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            max-width: 700px; width: 95%; text-align: center;
        }

        img.logo { width: 130px; margin-bottom: 5px; }
        h1 { color: #2c3e50; margin: 5px 0; font-size: 1.8rem; }
        
        .section { margin: 10px 0; padding: 10px; border-bottom: 1px solid #f0f0f0; }

        .control-row { display: flex; justify-content: space-around; flex-wrap: wrap; gap: 10px; margin-top: 10px; }
        .control-item { display: flex; flex-direction: column; align-items: center; }
        label { font-size: 0.8rem; font-weight: bold; color: #7f8c8d; margin-bottom: 5px; }

        .btn-group { display: none; margin-top: 15px; }
        .btn {
            padding: 10px 20px; margin: 5px; border: none; border-radius: 8px;
            cursor: pointer; font-weight: bold; transition: 0.3s;
        }
        .student-btn { background: #3498db; color: white; }
        .teacher-btn { background: #2ecc71; color: white; }
        .refresh-btn { background: #f39c12; color: white; }
        .copy-btn { background: #95a5a6; color: white; margin-top: 10px; }

        #output-container {
            margin-top: 20px; text-align: left; background: #ffffff;
            padding: 20px; border-radius: 12px; border: 1px solid #ddd;
            max-height: 400px; overflow-y: auto; color: #2c3e50;
        }

        /* The Reveal Answer Styling */
        details {
            margin-top: 20px;
            padding: 10px;
            background: #f1f7ff;
            border-radius: 8px;
            border: 1px dashed #3498db;
            cursor: pointer;
        }
        summary { font-weight: bold; color: #3498db; outline: none; }
        .answer-content { margin-top: 10px; white-space: pre-wrap; color: #2c3e50; }

        .status { color: #3498db; font-style: italic; }
    </style>
</head>
<body>

<div class="container">
    <img src="logo_learnify.png" alt="Learnify Logo" class="logo">
    <h1>Learnify Ultimate</h1>

    <div class="section">
        <div onclick="document.getElementById('fileInput').click()" style="border: 2px dashed #3498db; padding: 15px; border-radius: 10px; cursor: pointer; background: #fff;">
            <span id="file-label">📁 Upload PDF or Image</span>
            <input type="file" id="fileInput" accept=".pdf,image/*" style="display:none" onchange="handleFileSelect()">
        </div>
    </div>

    <div class="section control-row">
        <div class="control-item">
            <label>Question Type</label>
            <div>
                <input type="radio" name="qType" value="objective" checked> Obj
                <input type="radio" name="qType" value="subjective"> Sub
                <input type="radio" name="qType" value="mix"> Mix
            </div>
        </div>
        <div class="control-item">
            <label>Amount</label>
            <select id="qCount">
                <option value="5">5 Questions</option>
                <option value="10">10 Questions</option>
                <option value="20">20 Questions</option>
            </select>
        </div>
    </div>

    <div id="btn-group" class="btn-group">
        <button class="btn student-btn" onclick="runAI('student')">🎒 Student Mode</button>
        <button class="btn teacher-btn" onclick="runAI('teacher')">🧑‍🏫 Teacher Mode</button>
        <button id="refreshBtn" class="btn refresh-btn" style="display:none;" onclick="runAI(lastMode)">🔄 Regenerate</button>
    </div>

    <div id="output-container">Upload a file to begin...</div>
    
    <button id="copyBtn" class="btn copy-btn" style="display:none;" onclick="copyText()">📋 Copy All</button>
</div>

<script>
    const pdfjsLib = window['pdfjs-dist/build/pdf'];
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

    let lastMode = 'student';

    function handleFileSelect() {
        const file = document.getElementById('fileInput').files[0];
        if (file) {
            document.getElementById('file-label').innerText = "📄 " + file.name;
            document.getElementById('btn-group').style.display = "block";
        }
    }

    async function runAI(mode) {
        lastMode = mode;
        const fileInput = document.getElementById('fileInput');
        const outputContainer = document.getElementById('output-container');
        const qCount = document.getElementById('qCount').value;
        const qType = document.querySelector('input[name="qType"]:checked').value;
        const file = fileInput.files[0];

        outputContainer.innerHTML = '<span class="status">📡 Processing document and thinking...</span>';
        document.getElementById('copyBtn').style.display = "none";

        try {
            let extractedText = "";
            if (file.type === "application/pdf") {
                const arrayBuffer = await file.arrayBuffer();
                const pdf = await pdfjsLib.getDocument({data: arrayBuffer}).promise;
                for (let i = 1; i <= pdf.numPages; i++) {
                    const page = await pdf.getPage(i);
                    const content = await page.getTextContent();
                    extractedText += content.items.map(item => item.str).join(' ') + "\n";
                }
            } else {
                extractedText = await puter.ai.img2txt(file);
            }

            let typeInstruction = (qType === 'objective') ? "multiple-choice (A,B,C,D)" : (qType === 'subjective') ? "subjective" : "mix of MCQ and subjective";

            // We now ALWAYS ask for answers, but we will format the response specifically
            const prompt = `Based on: "${extractedText}", create ${qCount} ${typeInstruction} questions. 
            CRITICAL FORMATTING: Put the questions first. Then, at the very end, add a line that says "---ANSWERS-START---" followed by the answer key.`;

            const response = await puter.ai.chat(prompt, { model: 'google/gemini-2.5-flash' });
            const fullResponse = response.message.content;

            // Split the response into Questions and Answers
            const parts = fullResponse.split("---ANSWERS-START---");
            const questions = parts[0].trim();
            const answers = parts[1] ? parts[1].trim() : "Answers not generated. Try again.";

            if (mode === 'student') {
                // Hide answers in a toggle
                outputContainer.innerHTML = `
                    <div style="white-space: pre-wrap;">${questions}</div>
                    <details>
                        <summary>💡 Click to Reveal Answers</summary>
                        <div class="answer-content">${answers}</div>
                    </details>
                `;
            } else {
                // Teacher mode: show everything plainly
                outputContainer.innerHTML = `
                    <div style="white-space: pre-wrap;">${questions}</div>
                    <hr>
                    <div style="white-space: pre-wrap; font-weight: bold;">ANSWER KEY:</div>
                    <div style="white-space: pre-wrap;">${answers}</div>
                `;
            }
            
            document.getElementById('refreshBtn').style.display = "inline-block";
            document.getElementById('copyBtn').style.display = "inline-block";

        } catch (err) {
            outputContainer.innerHTML = "❌ Error: " + err.message;
        }
    }

    function copyText() {
        const text = document.getElementById('output-container').innerText;
        navigator.clipboard.writeText(text);
        alert("Copied everything (Questions + Answers) to clipboard!");
    }
</script>
</body>
</html>
